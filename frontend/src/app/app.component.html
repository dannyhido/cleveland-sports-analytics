<div class="app-shell-container">
  <mat-toolbar color="primary" class="main-app-toolbar">
    <mat-icon class="branding-icon">analytics</mat-icon>
    <span class="app-title">CLE Sports Analytics Hub</span>
  </mat-toolbar>

  <div class="main-content-layout">
    <aside class="sidebar-nav-panel">
      <nav class="navigation-menu">
        <a 
          *ngFor="let item of navItems" 
          [routerLink]="item.route"
          class="nav-menu-item"
          [class.active-link]="isRouteActive(item.route)">
          <mat-icon class="menu-icon">{{ item.icon }}</mat-icon>
          <span class="menu-label">{{ item.label }}</span>
        </a>
      </nav>
    </aside>

    <main class="workspace-viewport">
      <div class="view-scroll-container">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>

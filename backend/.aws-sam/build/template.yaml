AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Cleveland Sports Analytics Hub - Production Serverless Backend. Optimized
  for ultra-low cost execution under AWS Free Tier.

  '
Globals:
  Function:
    Timeout: 15
    MemorySize: 256
    Runtime: python3.13
    Environment:
      Variables:
        DYNAMODB_TABLE:
          Ref: SportsAnalyticsTable
Resources:
  SportsAnalyticsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: ClevelandSportsAnalytics
      PrimaryKey:
        Name: PK
        Type: String
  SportsHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowMethods:
        - GET
        - OPTIONS
        AllowHeaders:
        - Content-Type
        - Authorization
        AllowOrigins:
        - http://localhost:4200
  GetTeamStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetTeamStatsFunction
      Handler: app.lambda_handler
      Description: Retrieves dashboard and team historical analytics.
      Events:
        GetStats:
          Type: HttpApi
          Properties:
            Path: /teams/{teamId}
            Method: get
            ApiId:
              Ref: SportsHttpApi
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: SportsAnalyticsTable
    Metadata:
      SamResourceId: GetTeamStatsFunction
  GetPredictionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetPredictionsFunction
      Handler: app.lambda_handler
      Description: Exposes ML prediction modeling data for upcoming matchups.
      Events:
        GetPredictions:
          Type: HttpApi
          Properties:
            Path: /predictions/{teamId}
            Method: get
            ApiId:
              Ref: SportsHttpApi
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: SportsAnalyticsTable
    Metadata:
      SamResourceId: GetPredictionsFunction
  SportsDataEtlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: SportsDataEtlFunction
      Handler: fetch_sports_data.lambda_handler
      Timeout: 300
      MemorySize: 512
      Events:
        DailySportsUpdate:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 * * ? *)
            Name: ClevelandSportsDailyEtl
            Enabled: true
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: SportsAnalyticsTable
    Metadata:
      SamResourceId: SportsDataEtlFunction
Outputs:
  HttpApiUrl:
    Description: Base URL of the Sports Analytics HTTP API Gateway endpoint
    Value:
      Fn::Sub: https://${SportsHttpApi}.execute-api.${AWS::Region}.amazonaws.com
